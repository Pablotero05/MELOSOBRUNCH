<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.5, maximum-scale=1.0, user-scalable=no">
  <title>Galería | Meloso Brunch & Coffee</title>
  <link rel="icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!---<script src="https://cdn.tailwindcss.com/"></script>-->
  <link rel="stylesheet" href="../dist/output.css">
  <link rel="stylesheet" href="../fontawesome/css/all.css">
  <link rel="stylesheet" href="../fontawesome/css/brands.css">
  <link rel="stylesheet" href="../css/styles.css">

  <style>
    :root {
      --accent-color: #f2c3c3;
      --accent2-color: #f2d894;
      --primary-color: #d19f77;
      --dark-text-color: #6a4628;
      --gray-text-color: #a39388;
      --light-background-color: #f9f3ec;
      --dark-background-color: #634737;
      --button-rounded-radius: 12px;
      --font-family-heading: 'Poppins', sans-serif;
      --font-family-body: 'Nunito Sans', sans-serif;
    }
    body { background:var(--light-background-color); color:var(--dark-text-color); font-family:var(--font-family-body); }
    h1,h2,h3 { font-family:var(--font-family-heading); }
  
    :root {
      --primary-color: #d19f77;
      --light-background-color: #f9f3ec;
      --dark-background-color: #634737;
      --font-family-heading: 'Poppins', sans-serif;
      --font-family-body: 'Nunito Sans', sans-serif;
    }
    body { background:var(--light-background-color); }
    
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Botón retroceso -->
  <div class="back-button-wrapper">
    <a href="#" class="back-button" id="back-btn">
      <i class="fas fa-arrow-left back-button__icon"></i>
    </a>
  </div>

  <script>
    document.getElementById('back-btn').addEventListener('click', function(e) {
      e.preventDefault();
      history.back();
    });
  </script>

  <!-- Hero Galería -->
  <section class="relative bg-[var(--primary-color)] py-24 lg:py-32 overflow-hidden">
    <div class="absolute inset-0 bg-black opacity-20"></div>
    <div class="container mx-auto px-4 relative z-10 text-center">
      <div class="inline-flex items-center justify-center w-24 h-24 bg-white rounded-full mb-8 shadow-2xl">
        <i class="fa-solid fa-camera text-4xl text-[var(--primary-color)]"></i>
      </div>
      <h1 class="font-[var(--font-family-heading)] text-4xl sm:text-5xl lg:text-6xl font-bold text-white mb-6">
        Galería
      </h1>
      <p class="text-xl text-white opacity-90 max-w-2xl mx-auto">
        Con amor sabe mejor
      </p>
    </div>
  </section>

  <!-- GALERÍA 100% FOTOS – IMPECABLE -->
  <section class="bg-[var(--light-background-color)] py-16 lg:py-24">
    <div class="container mx-auto px-4 max-w-7xl">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-6 auto-rows-[180px] md:auto-rows-[220px]">

        <!-- 1 – Alta (2 filas) -->
        <div class="relative overflow-hidden rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-500 group row-span-2">
          <img src="https://imagedelivery.net/xaKlCos5cTg_1RWzIu_h-A/5765ab8c-6baf-4654-a008-2f50f0c44d00/public" 
               alt="Tostada Combi Perfecta" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
        </div>

        <!-- 2 -->
        <div class="relative overflow-hidden rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-500 group">
          <img src="https://images.pexels.com/photos/3768001/pexels-photo-3768001.jpeg" 
               alt="Café y ambiente" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
        </div>

        <!-- 3 – Ancha en móvil -->
        <div class="relative overflow-hidden rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-500 group sm:col-span-2 lg:col-span-1">
          <img src="https://scontent.fvgo1-1.fna.fbcdn.net/v/t39.30808-6/517014663_727408486701868_8465597345354524523_n.jpg?_nc_cat=101&ccb=1-7&_nc_sid=cc71e4&_nc_ohc=MigXuC_wA6kQ7kNvwGyzeei&_nc_oc=AdmoFg4lMhBIf6HSo1V9fCHzD_kq6GPsqduIh1BipLUx1fzuNwfLFJ67knct-MLTPho&_nc_zt=23&_nc_ht=scontent.fvgo1-1.fna&_nc_gid=fyGoo5Jc7oaA47dfuH3kHQ&oh=00_AflY3v53oOlYMQizn6LqW9jpB1UYM1pZY3SLH2NI6TYiSg&oe=693BF13C" 
               alt="French Toast Rosco" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
        </div>

        <!-- 4 – Alta (2 filas) -->
        <div class="relative overflow-hidden rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-500 group row-span-2">
          <img src="https://imagedelivery.net/xaKlCos5cTg_1RWzIu_h-A/b124ca31-c747-41ee-1410-c8d75ed26700/public" 
               alt="Local Meloso" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
        </div>

        <!-- 5 -->
        <div class="relative overflow-hidden rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-500 group">
          <img src="https://imagedelivery.net/xaKlCos5cTg_1RWzIu_h-A/73f5757a-9cef-4b4e-ca6b-b4f46e28d200/public" 
               alt="Tortitas Lotus Lovers" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
        </div>

        <!-- 6 -->
        <div class="relative overflow-hidden rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-500 group">
          <img src="https://images.pexels.com/photos/376464/pexels-photo-376464.jpeg" 
               alt="Bowl Morenito" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
        </div>

        <!-- 7 – Ancha grande (2 columnas en desktop) -->
        <div class="relative overflow-hidden rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-500 group sm:col-span-2 lg:col-span-2">
          <img src="https://scontent.fvgo1-1.fna.fbcdn.net/v/t39.30808-6/469814388_17982097427786777_7877646764449635272_n.jpg?_nc_cat=108&ccb=1-7&_nc_sid=127cfc&_nc_ohc=6fjHlB2wSnMQ7kNvwHsjQ2e&_nc_oc=AdkCEkGYnxgw6LXzFxwJvCNYLYMqscFgB1fcH0sVxY0WVPIcyiCi-YoceUYLf3TP0F4&_nc_zt=23&_nc_ht=scontent.fvgo1-1.fna&_nc_gid=hmEdBrIWqGvgRCr_NVgGWQ&oh=00_AfmAe7lzSonNSj2AXcMXc_-orIohCheB6MMACLwzA9SLGg&oe=693BF3E9" 
               alt="Fachada y terraza" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
        </div>

        <!-- 8 -->
        <div class="relative overflow-hidden rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-500 group">
          <img src="https://images.pexels.com/photos/892649/pexels-photo-892649.jpeg" 
               alt="Croissant Sacrioto" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
        </div>

        <!-- 9 – Bonus -->
        <div class="relative overflow-hidden rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-500 group">
          <img src="https://imagedelivery.net/xaKlCos5cTg_1RWzIu_h-A/c7c5ef27-1b9e-4be5-0b9c-2c78e110c400/public" 
               alt="Café con latte art" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
        </div>

        <!-- 10 – Extra para rellenar bonito -->
        <div class="relative overflow-hidden rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-500 group row-span-2">
          <img src="https://th.bing.com/th/id/OIP.AdGvIjbTtipTYMfkKDNl4QHaJ4?o=7&cb=ucfimg2&rm=3&ucfimg=1&rs=1&pid=ImgDetMain&o=7&rm=3" 
               alt="Momento Meloso" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-[var(--dark-background-color)] text-white py-12 mt-auto">
    <div class="container mx-auto px-4 text-center">
      <p class="text-sm opacity-70">
        © 2025 Meloso Brunch & Coffee | Rúa Rafael Picó 28, Portonovo
      </p>
    </div>
  </footer>

</body>
</html>
